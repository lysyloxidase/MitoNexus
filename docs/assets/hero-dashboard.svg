<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MitoNexus hero dashboard preview</title>
  <desc id="desc">Illustrated overview of the MitoNexus analysis workspace with biomarker intake, 3D knowledge graph, mitochondrion overlay, and PDF report panels.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="48" x2="1184" y2="672" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071426"/>
      <stop offset="0.55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#13233A"/>
      <stop offset="1" stop-color="#0B1323"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" rx="40" fill="url(#bg)"/>
  <circle cx="186" cy="122" r="170" fill="#14B8A6" fill-opacity="0.1"/>
  <circle cx="1120" cy="590" r="210" fill="#38BDF8" fill-opacity="0.08"/>


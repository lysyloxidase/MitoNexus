  <text x="84" y="152" fill="white" font-size="52" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Personalized mitochondrial intelligence</text>
  <text x="84" y="198" fill="#CBD5E1" font-size="24" font-family="Segoe UI, Arial, sans-serif">Biomarker analysis, multi-agent reasoning, 3D visualization, and clinician-ready PDF reporting.</text>


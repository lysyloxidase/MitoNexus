services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      MITONEXUS_ENVIRONMENT: development
      MITONEXUS_DEBUG: "true"
      MITONEXUS_CORS_ORIGINS: '["http://localhost:3000"]'
      MITONEXUS_FRONTEND_URL: http://localhost:3000
      MITONEXUS_DATABASE_URL: postgresql+asyncpg://mitonexus:mitonexus_dev@postgres:5432/mitonexus
      MITONEXUS_REDIS_URL: redis://redis:6379/0
      MITONEXUS_NEO4J_URI: bolt://neo4j:7687
      MITONEXUS_NEO4J_PASSWORD: mitonexus_dev
      MITONEXUS_OLLAMA_HOST: http://ollama:11434
      MITONEXUS_LANGFUSE_HOST: http://langfuse:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - report_data:/app/apps/backend/.mitonexus/reports
    ports:
      - "${MX_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  celery-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: celery -A mitonexus.tasks worker --loglevel=info --concurrency=2
    environment:
      MITONEXUS_ENVIRONMENT: development
      MITONEXUS_DEBUG: "true"
      MITONEXUS_CORS_ORIGINS: '["http://localhost:3000"]'
      MITONEXUS_FRONTEND_URL: http://localhost:3000
      MITONEXUS_DATABASE_URL: postgresql+asyncpg://mitonexus:mitonexus_dev@postgres:5432/mitonexus
      MITONEXUS_REDIS_URL: redis://redis:6379/0
      MITONEXUS_NEO4J_URI: bolt://neo4j:7687
      MITONEXUS_NEO4J_PASSWORD: mitonexus_dev
      MITONEXUS_OLLAMA_HOST: http://ollama:11434
      MITONEXUS_LANGFUSE_HOST: http://langfuse:3000
    env_file:
      - path: .env
        required: false
    volumes:
      - report_data:/app/apps/backend/.mitonexus/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: celery -A mitonexus.tasks beat --loglevel=info
    environment:
      MITONEXUS_ENVIRONMENT: development
      MITONEXUS_DEBUG: "true"
      MITONEXUS_CORS_ORIGINS: '["http://localhost:3000"]'
      MITONEXUS_FRONTEND_URL: http://localhost:3000
      MITONEXUS_DATABASE_URL: postgresql+asyncpg://mitonexus:mitonexus_dev@postgres:5432/mitonexus
      MITONEXUS_REDIS_URL: redis://redis:6379/0
      MITONEXUS_NEO4J_URI: bolt://neo4j:7687
      MITONEXUS_NEO4J_PASSWORD: mitonexus_dev
      MITONEXUS_OLLAMA_HOST: http://ollama:11434
      MITONEXUS_LANGFUSE_HOST: http://langfuse:3000
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: celery -A mitonexus.tasks flower --port=5555
    environment:
      MITONEXUS_ENVIRONMENT: development
      MITONEXUS_DEBUG: "true"
      MITONEXUS_CORS_ORIGINS: '["http://localhost:3000"]'
      MITONEXUS_FRONTEND_URL: http://localhost:3000
      MITONEXUS_DATABASE_URL: postgresql+asyncpg://mitonexus:mitonexus_dev@postgres:5432/mitonexus
      MITONEXUS_REDIS_URL: redis://redis:6379/0
      MITONEXUS_NEO4J_URI: bolt://neo4j:7687
      MITONEXUS_NEO4J_PASSWORD: mitonexus_dev
      MITONEXUS_OLLAMA_HOST: http://ollama:11434
      MITONEXUS_LANGFUSE_HOST: http://langfuse:3000
    env_file:
      - path: .env
        required: false
    ports:
      - "${MX_FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: mitonexus
      POSTGRES_PASSWORD: mitonexus_dev
      POSTGRES_DB: mitonexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${MX_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitonexus"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${MX_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  neo4j:
    image: neo4j:2025-community
    environment:
      NEO4J_AUTH: neo4j/mitonexus_dev
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
    volumes:
      - neo4j_data:/data
    ports:
      - "${MX_NEO4J_HTTP_PORT:-7474}:7474"
      - "${MX_NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p mitonexus_dev 'RETURN 1;' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "${MX_OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://mitonexus:mitonexus_dev@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: dev_secret_change_me
      SALT: dev_salt_change_me
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    ports:
      - "${MX_LANGFUSE_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://' + process.env.HOSTNAME + ':3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  postgres_data:
  neo4j_data:
  ollama_data:
  report_data:
